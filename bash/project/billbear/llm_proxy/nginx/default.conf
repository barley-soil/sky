# Nginx Conf

server {
    listen       80;
    server_name  _;

    # 字符集
    charset utf-8;

    # 关闭端口重定向
    port_in_redirect off;

    # NextJS
    location / {
        proxy_pass http://llm-proxy-web:3000/;

        # 允许上传大文件
        client_max_body_size 50m;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_redirect http://localhost:3000/ http://8.133.167.42/;

        # 禁用缓存
        proxy_request_buffering off;
    }

    # Gateway
    location /v1/ {
        proxy_pass http://gateway:8080/v1/;

        # 允许上传大文件
        client_max_body_size 50m;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 禁用缓存
        proxy_request_buffering off;
    }


    # Java
    location /api/ {
        proxy_pass http://llm-proxy:8080/;

        # 允许上传大文件
        client_max_body_size 50m;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 禁用缓存
        proxy_request_buffering off;
    }



    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}